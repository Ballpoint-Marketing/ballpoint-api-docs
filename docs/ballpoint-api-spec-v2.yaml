  /v1/billing/orders/{order_id}/sse-token:
    post:
      tags:
      - Orders
      summary: Mint SSE token
      operationId: mintSseToken
      description: >-
        Mint a short-lived HMAC token scoped to a single order. Use the returned token
        as a query parameter when connecting to the SSE events endpoint. Required because
        browser EventSource cannot send custom Authorization headers.
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: SSE token minted
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Short-lived HMAC token (hex)
                  expires_at:
                    type: string
                    format: date-time
                    description: Token expiry (UTC)
                  order_id:
                    type: string
                  connect_url:
                    type: string
                    description: Ready-to-use SSE URL with token
        '404':
          description: Order not found or not accessible
        '401':
          description: Authentication required (header auth only)

  /v1/billing/orders/{order_id}/events:
    get:
      tags:
      - Orders
      summary: SSE real-time order status stream
      operationId: orderEvents
      description: >-
        Server-Sent Events stream for real-time order status updates.
        Authenticate via query token (from POST /sse-token) or standard header auth.
        Subject to per-order and per-account subscriber caps (429 if exceeded).
        Event types: 'status_changed' (payload), 'heartbeat' (keep-alive every 30s),
        'dropped' (client fell behind — reconnect to resume).
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
      - name: token
        in: query
        description: Short-lived SSE token from POST /orders/{id}/sse-token
        schema:
          type: string
      responses:
        '200':
          description: SSE event stream (text/event-stream)
          content:
            text/event-stream: {}
        '401':
          description: Missing or invalid authentication
        '404':
          description: Order not found
        '429':
          description: >-
            Subscriber cap exceeded. Either per-order (MAX_SSE_SUBSCRIBERS_PER_ORDER)
            or per-account (MAX_SSE_SUBSCRIBERS_PER_ACCOUNT) limit reached.
